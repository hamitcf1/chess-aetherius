name: Build and Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GEMINI_API_KEY_1: ${{ secrets.VITE_GEMINI_API_KEY_1 }}
          VITE_GEMINI_API_KEY_2: ${{ secrets.VITE_GEMINI_API_KEY_2 }}
          VITE_GEMINI_API_KEY_3: ${{ secrets.VITE_GEMINI_API_KEY_3 }}
          VITE_GEMINI_API_KEY_4: ${{ secrets.VITE_GEMINI_API_KEY_4 }}
          VITE_GEMINI_API_KEY_5: ${{ secrets.VITE_GEMINI_API_KEY_5 }}
          VITE_GEMINI_API_KEY_6: ${{ secrets.VITE_GEMINI_API_KEY_6 }}
          VITE_GEMINI_API_KEY_7: ${{ secrets.VITE_GEMINI_API_KEY_7 }}
          VITE_GEMINI_API_KEY_8: ${{ secrets.VITE_GEMINI_API_KEY_8 }}
          VITE_GEMINI_API_KEY_9: ${{ secrets.VITE_GEMINI_API_KEY_9 }}
          VITE_GEMINI_API_KEY_10: ${{ secrets.VITE_GEMINI_API_KEY_10 }}
          VITE_GEMINI_API_KEY_11: ${{ secrets.VITE_GEMINI_API_KEY_11 }}
          VITE_GEMINI_API_KEY_12: ${{ secrets.VITE_GEMINI_API_KEY_12 }}
          VITE_GEMINI_API_KEY_13: ${{ secrets.VITE_GEMINI_API_KEY_13 }}
        run: npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: chessaetherius
          channelId: live
